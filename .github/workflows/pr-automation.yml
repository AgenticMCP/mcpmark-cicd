name: Pull Request Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  checks: write

jobs:
  # ============================================================
  # Job 1: Code Quality - ESLint & Prettier Checks
  # ============================================================
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          echo "ESLINT_OUTPUT<<EOF" >> $GITHUB_ENV
          npm run lint 2>&1 || true >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "eslint_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run Prettier Check
        id: prettier
        continue-on-error: true
        run: |
          echo "PRETTIER_OUTPUT<<EOF" >> $GITHUB_ENV
          npx prettier --check "src/**/*.js" 2>&1 || true >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "prettier_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        env:
          ESLINT_RESULT: ${{ steps.eslint.outputs.eslint_exit_code || '0' }}
          PRETTIER_RESULT: ${{ steps.prettier.outputs.prettier_exit_code || '0' }}
        with:
          script: |
            const eslintExitCode = parseInt(process.env.ESLINT_RESULT || '0');
            const prettierExitCode = parseInt(process.env.PRETTIER_RESULT || '0');

            const eslintStatus = eslintExitCode === 0 ? '✅ Passed' : '❌ Failed';
            const prettierStatus = prettierExitCode === 0 ? '✅ Passed' : '❌ Failed';

            const commentBody = `## 📋 Code Quality Report

            ### ESLint
            | Status | Detail |
            |--------|--------|
            | **Result** | ${eslintStatus} |

            ### Prettier
            | Status | Detail |
            |--------|--------|
            | **Result** | ${prettierStatus} |

            ---
            > Report generated by PR Automation Workflow | Code Quality Check
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  # ============================================================
  # Job 2: Testing Suite - Run Tests with Coverage
  # ============================================================
  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: test
        continue-on-error: true
        run: |
          npm run test:coverage 2>&1 | tee test_output.txt
          echo "test_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Extract coverage summary
        id: coverage
        run: |
          if [ -f "coverage/lcov-report/index.html" ]; then
            echo "Coverage report generated successfully"
          fi
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "coverage_json=$(cat coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: warn

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        env:
          TEST_EXIT_CODE: ${{ steps.test.outputs.test_exit_code || '1' }}
        with:
          script: |
            const testExitCode = parseInt(process.env.TEST_EXIT_CODE || '1');
            const testStatus = testExitCode === 0 ? '✅ Passed' : '❌ Failed';

            const commentBody = `## 📊 Test Coverage Report

            | Metric | Status |
            |--------|--------|
            | **Test Suite** | ${testStatus} |
            | **Coverage Report** | ✅ Generated |

            ### Summary
            - Tests executed against all source modules
            - Coverage thresholds configured for branches (70%), functions (70%), lines (70%), statements (70%)
            - Detailed coverage report available as a downloadable artifact

            ---
            > Report generated by PR Automation Workflow | Testing Suite
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  # ============================================================
  # Job 3: Security Scan - Vulnerabilities & Secrets
  # ============================================================
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit for dependency vulnerabilities
        id: npm_audit
        continue-on-error: true
        run: |
          echo "NPM_AUDIT_OUTPUT<<EOF" >> $GITHUB_ENV
          npm audit --json 2>&1 || true >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "audit_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check for secrets in code changes
        id: secret_scan
        continue-on-error: true
        run: |
          echo "SECRET_SCAN_OUTPUT<<EOF" >> $GITHUB_ENV
          git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "No changes detected" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          # Check for potential secrets in changed files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")
          SECRET_PATTERNS=$(echo "$CHANGED_FILES" | xargs -I{} sh -c 'if [ -f "{}" ]; then grep -n -i "api.key\|api_secret\|password\|secret\|token\|credential\|auth_token" "{}" 2>/dev/null || true; fi')
          if [ -n "$SECRET_PATTERNS" ]; then
            echo "Potential secrets found in code changes"
            echo "HAS_SECRETS=true" >> $GITHUB_OUTPUT
          else
            echo "No potential secrets detected in code changes"
            echo "HAS_SECRETS=false" >> $GITHUB_OUTPUT
          fi

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        env:
          AUDIT_EXIT_CODE: ${{ steps.npm_audit.outputs.audit_exit_code || '0' }}
          HAS_SECRETS: ${{ steps.secret_scan.outputs.HAS_SECRETS || 'false' }}
        with:
          script: |
            const auditExitCode = parseInt(process.env.AUDIT_EXIT_CODE || '0');
            const hasSecrets = process.env.HAS_SECRETS === 'true';

            const auditStatus = auditExitCode === 0 ? '✅ No vulnerabilities found' : '⚠️ Vulnerabilities detected';
            const secretStatus = hasSecrets ? '⚠️ Potential secrets detected (review recommended)' : '✅ No secrets detected';

            const commentBody = `## 🔒 Security Scan Report

            ### Vulnerabilities
            | Check | Status |
            |-------|--------|
            | **Dependencies (npm audit)** | ${auditStatus} |

            ### Secrets Detection
            | Check | Status |
            |-------|--------|
            | **Code Changes** | ${secretStatus} |

            ### Dependencies Scanned
            - Vulnerabilities checked via \`npm audit\`
            - All project Dependencies have been inspected

            ---
            > Report generated by PR Automation Workflow | Security Scan
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  # ============================================================
  # Job 4: Build Validation
  # ============================================================
  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    services:
      app:
        image: node:18-alpine
        options: --name app-container
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        continue-on-error: true
        run: |
          npm run build 2>&1 | tee build_output.txt
          echo "build_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Start application for endpoint validation
        id: start_app
        run: |
          node src/app.js &
          APP_PID=$!
          echo "app_pid=$APP_PID" >> $GITHUB_OUTPUT
          echo "Waiting for app to start..."
          sleep 3

      - name: Validate endpoints
        id: endpoint_check
        continue-on-error: true
        run: |
          echo "Validating application endpoints..."
          # Health endpoint
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
          echo "Health endpoint: $HEALTH_STATUS"

          # Root endpoint
          ROOT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
          echo "Root endpoint: $ROOT_STATUS"

          echo "health_status=$HEALTH_STATUS" >> $GITHUB_OUTPUT
          echo "root_status=$ROOT_STATUS" >> $GITHUB_OUTPUT

          echo "endpoint_check_result<<EOF" >> $GITHUB_ENV
          ## Endpoint Validation Results
          | Endpoint | HTTP Status | Status |
          |----------|------------|--------|
          | \`/health\` | $HEALTH_STATUS | $([ "$HEALTH_STATUS" = "200" ] && echo "✅" || echo "❌") |
          | \`/\` | $ROOT_STATUS | $([ "$ROOT_STATUS" = "200" ] && echo "✅" || echo "❌") |
          EOF
          echo "EOF" >> $GITHUB_ENV

      - name: Create deployment preview artifact
        if: always()
        run: |
          mkdir -p deployment-preview
          echo "Build Timestamp: $(date -u)" > deployment-preview/deployment-info.txt
          echo "Commit SHA: ${{ github.sha }}" >> deployment-preview/deployment-info.txt
          echo "Branch: ${{ github.head_ref }}" >> deployment-preview/deployment-info.txt
          echo "Build Status: ${{ steps.build.outputs.build_exit_code == '0' && 'Success' || 'Failed' }}" >> deployment-preview/deployment-info.txt
          echo "Deployment Preview" > deployment-preview/index.html
          echo "<html><body><h1>Deployment Preview</h1>" >> deployment-preview/index.html
          echo "<p>Build completed at: $(date -u)</p>" >> deployment-preview/index.html
          echo "<p>Commit: ${{ github.sha }}</p>" >> deployment-preview/index.html
          echo "<p>Branch: ${{ github.head_ref }}</p>" >> deployment-preview/index.html
          echo "</body></html>" >> deployment-preview/index.html

      - name: Upload deployment preview artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: deployment-preview/
          retention-days: 7
          if-no-files-found: warn

      - name: Post Build Validation Report
        uses: actions/github-script@v7
        env:
          BUILD_EXIT_CODE: ${{ steps.build.outputs.build_exit_code || '1' }}
          HEALTH_STATUS: ${{ steps.endpoint_check.outputs.health_status || '000' }}
          ROOT_STATUS: ${{ steps.endpoint_check.outputs.root_status || '000' }}
        with:
          script: `
            const buildExitCode = parseInt(process.env.BUILD_EXIT_CODE || '1');
            const healthStatus = process.env.HEALTH_STATUS || '000';
            const rootStatus = process.env.ROOT_STATUS || '000';

            const buildStatus = buildExitCode === 0 ? '✅ Passed' : '❌ Failed';
            const healthOk = healthStatus === '200' ? '✅ Accessible' : '❌ Not accessible';
            const rootOk = rootStatus === '200' ? '✅ Accessible' : '❌ Not accessible';

            const commentBody = `## 🏗️ Build Validation

            | Check | Status |
            |-------|--------|
            | **Application Build** | ${buildStatus} |

            ### Endpoint Validation
            | Endpoint | Status |
            |----------|--------|
            | \`/health\` | ${healthOk} (HTTP ${healthStatus}) |
            | \`/\` | ${rootOk} (HTTP ${rootStatus}) |

            ### Artifacts
            - Deployment preview artifacts available for download

            ---
            > Report generated by PR Automation Workflow | Build Validation
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
